# =============================================================
# DevPlanner with Remote MCP - Multi-Agent Task Router
# =============================================================
#
# 【概要】
# GitHub IssueをAI（Claude）が分析し、タスクを自動分解して
# 適切なAIエージェントに振り分けるワークフローです。
#
# 【処理フロー】
# ┌─────────────────────────────────────────────────────────────┐
# │ 1. decompose-task (タスク分解)                              │
# │    - Issue内容を取得                                        │
# │    - 実行条件をチェック（Statusのみ）                       │
# │    - テンプレートファイル読み込み（soda/cicd/mlops）        │
# │    - Claude APIでタスク分解（サブエージェント分割対応）     │
# │    - task-composerによる静的解析（ファイル競合検出）        │
# │    - DAG JSON生成（task-composer実行用）                    │
# │    - Projects v2 Statusを「作業中」に更新                   │
# │    - Issueにコメント投稿                                    │
# └─────────────────────────────────────────────────────────────┘
#                            ↓
# ┌─────────────────────────────────────────────────────────────┐
# │ 2. execute-tasks-composer (タスク実行) ※Phase 4: DAG並列   │
# │    - task-composerでDAGに基づく並列実行                     │
# │    - 依存関係を考慮した実行順序制御                         │
# │    - development → Soda (コーディングエージェント)          │
# │    - cicd → CICDAgent (CI/CDパイプライン)                   │
# │    - training → MLOps (モデル学習)                          │
# │    - evaluation → IF (GPU評価) ※未実装                     │
# └─────────────────────────────────────────────────────────────┘
#                            ↓
# ┌─────────────────────────────────────────────────────────────┐
# │ 3. aggregate-results (結果集約)                             │
# │    - 全タスクの実行結果をまとめてIssueにレポート            │
# └─────────────────────────────────────────────────────────────┘
#
# ※ dispatch-tasks (Matrix実行) は Phase 4 移行により無効化
#
# 【実行条件】
# IssueのStatusが「作業前」または「Not Started」の場合にタスク分解が実行されます
#
# 【必要なSecrets】
# - AWS_ROLE_ARN          : AWS OIDC認証用のロールARN
# - GH_PAT_PROJECTS       : GitHub Projects v2操作用のPAT
# - COGNITO_USERNAME      : Cognito認証用ユーザー名
# - COGNITO_PASSWORD      : Cognito認証用パスワード
# - SODA_MCP_SECRET       : Soda MCP接続用シークレット
# - SODA_REMOTE_MCP_ARN_ENCODED : Soda Remote MCPのARN（URLエンコード済み）
# - CICD_AGENT_*          : CICDAgent接続情報（HOST/PORT/TOKEN）
# - MLOPS_AGENT_*         : MLOpsAgent接続情報（HOST/PORT/TOKEN）
#
# =============================================================

name: DevPlanner (Remote MCP)

# -------------------------------------------------------------
# トリガー設定
# -------------------------------------------------------------
on:
  # 手動実行: GitHub UIから「Run workflow」でIssue番号を指定して実行
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'タスク分解対象のIssue番号'
        required: true
        type: number

  # 自動実行: Issueイベント発生時に自動で起動
  # - opened: 新しいIssueが作成されたとき
  # - edited: Issueの内容が編集されたとき
  # - labeled: Issueにラベルが付けられたとき
  issues:
    types: [opened, edited, labeled]

# -------------------------------------------------------------
# 権限設定
# GitHub Actionsが使用するトークンの権限を最小限に設定
# -------------------------------------------------------------
permissions:
  id-token: write   # AWS OIDC認証に必要（一時的な認証情報を取得）
  contents: read    # リポジトリのコードや設定ファイルを読み取り
  issues: write     # Issueへのコメント投稿とラベル操作

# -------------------------------------------------------------
# 環境変数（全ジョブで共通利用）
# -------------------------------------------------------------
env:
  AWS_REGION: us-east-1           # Bedrock API（Claude Opus 4.5）
  SODA_MCP_REGION: ap-northeast-1  # Soda Remote MCP

jobs:
  # =============================================================
  # Job 1: decompose-task（タスク分解ジョブ）
  # =============================================================
  # 【役割】
  # - GitHub IssueをClaude AIで分析し、実行可能なタスクに分解
  # - 分解したタスクをJSON形式で出力し、後続ジョブに渡す
  #
  # 【処理の流れ】
  # Step 1   : リポジトリをチェックアウト
  # Step 2   : Issue番号を取得（手動/自動実行で取得方法が異なる）
  # Step 3   : 実行条件チェック（Statusのみ）
  # Step 3.5 : テンプレートファイル読み込み（soda/cicd/mlops）
  # Step 4   : Issueの詳細取得とClaude用プロンプト構築
  # Step 5   : AWS認証（OIDC方式）
  # Step 6   : Claude APIでタスク分解を実行
  # Step 7   : Claude出力からJSONを抽出
  # Step 8   : タスク情報をMatrix形式に変換
  # Step 8.1 : task-composerによる静的解析（ファイル競合検出）
  # Step 8.2 : 競合がある場合、依存関係を追加
  # Step 8.5 : Projects v2のStatusを「作業中」に更新
  # Step 9   : タスク情報をArtifactとして保存
  # Step 10  : Issueに分解結果をコメント投稿
  # =============================================================
  decompose-task:
    runs-on: ubuntu-latest

    # 後続ジョブ（dispatch-tasks, aggregate-results）に渡す出力値
    outputs:
      tasks_matrix: ${{ steps.resolve_conflicts.outputs.tasks_matrix || steps.extract_tasks.outputs.tasks_matrix }}   # Matrix実行用のJSON配列
      tasks_count: ${{ steps.extract_tasks.outputs.tasks_count }}     # タスク数
      issue_number: ${{ steps.get_issue.outputs.issue_number }}       # 処理対象のIssue番号
      has_conflict: ${{ steps.static_analysis.outputs.has_conflict }} # ファイル競合検出フラグ

    steps:
      # -------------------------------------------------------
      # Step 1: リポジトリのチェックアウト
      # -------------------------------------------------------
      # リポジトリのコードをランナーにダウンロード
      # 設定ファイル（.github/config/）の読み取りに必要
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Issue番号の取得
      # -------------------------------------------------------
      # トリガー方式によってIssue番号の取得方法が異なる
      # - 手動実行(workflow_dispatch): inputs.issue_number から取得
      # - 自動実行(issues): event.issue.number から取得
      - name: Get Issue Number
        id: get_issue
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------------
      # Step 3: 実行条件のチェック
      # -------------------------------------------------------
      # IssueのStatusが「作業前」または「Not Started」の場合のみ後続処理を実行
      #
      # 【出力】
      # - should_run: 'true' or 'false'（後続ステップの実行可否）
      - name: Check Execution Conditions
        id: check_conditions
        uses: actions/github-script@v7
        env:
          GH_PAT_PROJECTS: ${{ secrets.GH_PAT_PROJECTS }}
          ISSUE_NUMBER: ${{ steps.get_issue.outputs.issue_number }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            let issue = null;
            try {
              issue = (await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              })).data;
            } catch (e) {
              console.log(`Issue取得に失敗: #${issueNumber}`);
              core.setOutput('should_run', 'false');
              return;
            }

            console.log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
            console.log(`🔍 DevPlanner (Remote MCP) 実行条件チェック`);
            console.log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
            console.log(`Issue: #${issueNumber}`);

            // ✅ 条件1: IssueのStatusチェック
            let statusOk = false;
            let statusValue = '(未設定)';
            let detectionMethod = '';

            try {
              // Projects v2 のStatusをGraphQL APIで取得 (優先: PAT経由)
              try {
                const query = `
                  query($owner: String!, $repo: String!, $issueNumber: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issueNumber) {
                        projectItems(first: 10) {
                          nodes {
                            project { title number }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue { name field { ... on ProjectV2SingleSelectField { name } } }
                                ... on ProjectV2ItemFieldTextValue { text field { ... on ProjectV2FieldCommon { name } } }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                const variables = { owner: context.repo.owner, repo: context.repo.repo, issueNumber };
                const usePat = !!(process.env.GH_PAT_PROJECTS && process.env.GH_PAT_PROJECTS.trim().length > 0);
                let result;
                if (usePat) {
                  const resp = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                      'Authorization': `bearer ${process.env.GH_PAT_PROJECTS}`,
                      'Content-Type': 'application/json',
                      'User-Agent': 'devplanner-graphql-pat'
                    },
                    body: JSON.stringify({ query, variables })
                  });
                  const json = await resp.json();
                  if (!resp.ok || json.errors) {
                    throw new Error(`GraphQL PAT error: HTTP ${resp.status} ${(json.errors && JSON.stringify(json.errors)) || ''}`);
                  }
                  result = json.data;
                } else {
                  result = await github.graphql(query, variables);
                }
                // 取得結果を簡素に確認
                const itemCount = result.repository?.issue?.projectItems?.nodes?.length || 0;
                console.log(`ProjectItems数: ${itemCount}`);

                const projectItems = result.repository?.issue?.projectItems?.nodes || [];

                // Projects v2 の Statusフィールドを探す
                for (const item of projectItems) {
                  const fieldValues = item.fieldValues?.nodes || [];

                  for (const fieldValue of fieldValues) {
                    const fieldName = fieldValue.field?.name;

                    if (fieldName === 'Status' && fieldValue.name) {
                      statusValue = fieldValue.name;
                      detectionMethod = 'Projects v2 (GraphQL)';
                      break;
                    }
                  }
                  if (statusValue !== '(未設定)') break;
                }
              } catch (graphqlError) {
                console.log(`⚠️ GraphQL API (Projects v2): ${graphqlError.message}`);
              }

              // デバッグ出力
              console.log(`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
              if (statusValue === '(未設定)') {
                console.log(`⚠️ このIssueはどのProjectにも紐付いていません`);
                console.log(`   GitHub UIで以下の操作を実施してください:`);
                console.log(`   Projects v2: Issueページ右サイドバー「Projects」から選択`);
              }

              // 許可されたStatusの値（大小文字・全角半角差異を吸収）
              const allowedStatuses = ['作業前', 'Not Started'];
              const norm = (s) => String(s || '').trim().toLowerCase();
              statusOk = allowedStatuses.map(norm).includes(norm(statusValue));

              if (detectionMethod) {
                console.log(`📊 検出方法: ${detectionMethod}`);
              }
              console.log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`);

            } catch (error) {
              console.log(`⚠️ Status取得エラー: ${error.message}`);
              console.log(`スタックトレース: ${error.stack}`);

              // エラー発生時は実行を拒否（厳格モード）
              console.log(`\nStatusを取得できませんでした。実行を中止します。`);
              statusOk = false;
              statusValue = '(取得失敗)';
            }

            console.log(`\n[条件1] IssueのStatus: ${statusValue} → ${statusOk ? '✅ OK' : '❌ NG'}`);

            // 総合判定（条件1のみ）
            const shouldRun = statusOk;
            console.log(`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
            console.log(`📊 総合判定: ${shouldRun ? '✅ 実行許可' : '❌ 実行スキップ'}`);
            console.log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);

            // 出力設定
            core.setOutput('should_run', shouldRun.toString());
            core.setOutput('guard_status', statusOk.toString());

            // GitHub通知
            if (!shouldRun) {
              core.notice(`🛑 DevPlanner (Remote MCP) 実行スキップ: Status不一致(${statusValue})`);
            } else {
              core.notice('✅ DevPlanner (Remote MCP) 実行条件を満たしました');
            }

      # -------------------------------------------------------
      # Step 3.5: テンプレートファイル読み込み
      # -------------------------------------------------------
      # 各エージェントタイプのタスクテンプレートを読み込み
      # プロンプト構築時に参照し、正しいJSON構造を生成させる
      - name: Load Task Templates
        id: load_templates
        if: steps.check_conditions.outputs.should_run == 'true'
        run: |
          echo "📂 テンプレートファイルを読み込み中..."

          # Soda（development）テンプレート
          if [ -f ".github/templates/task_template_soda.md" ]; then
            echo "soda_template<<SODA_EOF" >> $GITHUB_OUTPUT
            cat .github/templates/task_template_soda.md >> $GITHUB_OUTPUT
            echo "SODA_EOF" >> $GITHUB_OUTPUT
            echo "✅ task_template_soda.md 読み込み完了"
          else
            echo "soda_template=" >> $GITHUB_OUTPUT
            echo "⚠️ task_template_soda.md が見つかりません"
          fi

          # CICD テンプレート
          if [ -f ".github/templates/sqs-message-template-cicd.json" ]; then
            echo "cicd_template<<CICD_EOF" >> $GITHUB_OUTPUT
            cat .github/templates/sqs-message-template-cicd.json >> $GITHUB_OUTPUT
            echo "CICD_EOF" >> $GITHUB_OUTPUT
            echo "✅ sqs-message-template-cicd.json 読み込み完了"
          else
            echo "cicd_template=" >> $GITHUB_OUTPUT
            echo "⚠️ sqs-message-template-cicd.json が見つかりません"
          fi

          # MLOps（training）テンプレート
          if [ -f ".github/templates/sqs-message-template-mlops.json" ]; then
            echo "mlops_template<<MLOPS_EOF" >> $GITHUB_OUTPUT
            cat .github/templates/sqs-message-template-mlops.json >> $GITHUB_OUTPUT
            echo "MLOPS_EOF" >> $GITHUB_OUTPUT
            echo "✅ sqs-message-template-mlops.json 読み込み完了"
          else
            echo "mlops_template=" >> $GITHUB_OUTPUT
            echo "⚠️ sqs-message-template-mlops.json が見つかりません"
          fi

          # DevPlannerプロンプトテンプレート
          if [ -f ".github/templates/devplanner_prompt.md" ]; then
            echo "prompt_template<<PROMPT_EOF" >> $GITHUB_OUTPUT
            cat .github/templates/devplanner_prompt.md >> $GITHUB_OUTPUT
            echo "PROMPT_EOF" >> $GITHUB_OUTPUT
            echo "✅ devplanner_prompt.md 読み込み完了"
          else
            echo "prompt_template=" >> $GITHUB_OUTPUT
            echo "⚠️ devplanner_prompt.md が見つかりません"
          fi

      # -------------------------------------------------------
      # Step 4: Issue詳細の取得とClaudeプロンプト構築
      # -------------------------------------------------------
      # IssueのタイトルとBodyを取得し、外部テンプレートファイルから
      # 読み込んだプロンプトに変数を埋め込んでClaude用プロンプトを構築
      - name: Fetch Issue Details and Build Prompt
        id: issue_details
        if: steps.check_conditions.outputs.should_run == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.get_issue.outputs.issue_number }}
          SODA_TEMPLATE: ${{ steps.load_templates.outputs.soda_template }}
          CICD_TEMPLATE: ${{ steps.load_templates.outputs.cicd_template }}
          MLOPS_TEMPLATE: ${{ steps.load_templates.outputs.mlops_template }}
          PROMPT_TEMPLATE: ${{ steps.load_templates.outputs.prompt_template }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const title = issue.data.title;
            const body = issue.data.body || '詳細なし';
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}.git`;

            const correlation = `issue-${issueNumber}-flow`;
            const timestamp = new Date().toISOString();

            // テンプレート情報
            const sodaTemplate = process.env.SODA_TEMPLATE || '';
            const cicdTemplate = process.env.CICD_TEMPLATE || '';
            const mlopsTemplate = process.env.MLOPS_TEMPLATE || '';

            // 外部プロンプトテンプレートを読み込み、変数を置換
            let prompt = process.env.PROMPT_TEMPLATE || '';

            if (!prompt) {
              core.setFailed('プロンプトテンプレートが見つかりません: .github/templates/devplanner_prompt.md');
              return;
            }

            // テンプレートセクションの構築
            const sodaSection = sodaTemplate ? `**テンプレート参照**:\n${sodaTemplate}\n` : '';
            const cicdSection = cicdTemplate ? `**テンプレート参照**:\n\`\`\`json\n${cicdTemplate}\n\`\`\`\n` : '';
            const mlopsSection = mlopsTemplate ? `**テンプレート参照**:\n\`\`\`json\n${mlopsTemplate}\n\`\`\`\n` : '';

            // プレースホルダーを実際の値で置換
            prompt = prompt
              .replace(/\{\{ISSUE_NUMBER\}\}/g, issueNumber)
              .replace(/\{\{TITLE\}\}/g, title)
              .replace(/\{\{BODY\}\}/g, body)
              .replace(/\{\{REPO_URL\}\}/g, repoUrl)
              .replace(/\{\{CORRELATION\}\}/g, correlation)
              .replace(/\{\{TIMESTAMP\}\}/g, timestamp)
              .replace(/\{\{SODA_TEMPLATE_SECTION\}\}/g, sodaSection)
              .replace(/\{\{CICD_TEMPLATE_SECTION\}\}/g, cicdSection)
              .replace(/\{\{MLOPS_TEMPLATE_SECTION\}\}/g, mlopsSection);

            core.setOutput('prompt', prompt);
            core.setOutput('title', title);
            core.setOutput('repo_url', repoUrl);

      # -------------------------------------------------------
      # Step 5: AWS認証設定（OIDC方式）
      # -------------------------------------------------------
      # GitHub ActionsからAWSリソースにアクセスするための認証
      # OIDC方式を使用することで、長期的なアクセスキーを保存せずに
      # 一時的な認証情報を安全に取得できる
      - name: Configure AWS Credentials
        if: steps.check_conditions.outputs.should_run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------
      # Step 6: Claude APIによるタスク分解
      # -------------------------------------------------------
      # anthropics/claude-code-action を使用してClaude AIを呼び出し
      # Amazon Bedrock経由でClaude Opus 4.5を使用
      # 出力: タスク定義を含むJSON形式のレスポンス
      - name: Task Decomposition by Claude
        if: steps.check_conditions.outputs.should_run == 'true'
        id: claude
        timeout-minutes: 10  # タスク分解の最大時間
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: ${{ env.AWS_REGION }}
          ANTHROPIC_MODEL: us.anthropic.claude-opus-4-5-20251101-v1:0
        with:
          use_bedrock: true
          github_token: ${{ github.token }}
          prompt: ${{ steps.issue_details.outputs.prompt }}
          show_full_output: true

      # -------------------------------------------------------
      # Step 7: Claude出力からJSONを抽出
      # -------------------------------------------------------
      # Claude Actionの出力ファイルからタスク定義JSONを抽出
      # 以下の3つの方法を順番に試行（フォールバック機構）:
      # 1. 純粋なJSONとして直接パース
      # 2. ```json ... ``` フェンスを除去して再試行
      # 3. 最初の { から最後の } までを抽出して再試行
      - name: Save Claude Output
        if: steps.check_conditions.outputs.should_run == 'true'
        run: |
          # Claude Actionの出力ファイルからresultを抽出
          CLAUDE_OUTPUT="/home/runner/work/_temp/claude-execution-output.json"

          # ファイル存在確認（詳細なエラーメッセージ付き）
          if [ ! -f "$CLAUDE_OUTPUT" ]; then
            echo "❌ Error: Claude出力ファイルが見つかりません"
            echo "Expected path: $CLAUDE_OUTPUT"
            echo ""
            echo "=== /home/runner/work/_temp/ の内容 ==="
            ls -la /home/runner/work/_temp/ 2>/dev/null || echo "(ディレクトリが存在しません)"
            echo ""
            echo "=== 考えられる原因 ==="
            echo "1. Claude Actionが正常に完了しなかった"
            echo "2. 出力ファイルのパスが変更された"
            echo "3. Claude Actionのバージョン不一致"
            exit 1
          fi

          echo "✅ Claude出力ファイル確認OK: $CLAUDE_OUTPUT"
          echo "ファイルサイズ: $(wc -c < "$CLAUDE_OUTPUT") bytes"

          # 配列/オブジェクト形式を自動判定してresultを抽出
          if jq -e 'type == "array"' "$CLAUDE_OUTPUT" > /dev/null 2>&1; then
            echo "📄 出力形式: 配列"
            jq -r '[.[] | select(.type == "result") | .result] | max_by(length)' "$CLAUDE_OUTPUT" > raw_output.txt
          else
            echo "📄 出力形式: オブジェクト"
            jq -r '.result' "$CLAUDE_OUTPUT" > raw_output.txt
          fi

          # raw_output.txtの内容確認
          if [ ! -s raw_output.txt ]; then
            echo "❌ Error: resultフィールドが空です"
            echo "=== Claude出力の構造 ==="
            jq 'keys' "$CLAUDE_OUTPUT" 2>/dev/null || cat "$CLAUDE_OUTPUT" | head -100
            exit 1
          fi

          # JSON抽出（フォールバック付き）
          # 方法1: 純粋JSONとして直接パース
          if jq '.' raw_output.txt > tasks.json 2>/dev/null; then
            echo "✅ 純粋JSONとして解析成功"
          # 方法2: JSONフェンス（```json ... ```）を除去して再試行
          elif sed -n '/^```json/,/^```/{/^```/d;p}' raw_output.txt | jq '.' > tasks.json 2>/dev/null; then
            echo "✅ JSONフェンス除去後に解析成功"
          # 方法3: 最初の { から最後の } までを抽出して再試行
          elif sed -n '/{/,/}/p' raw_output.txt | jq '.' > tasks.json 2>/dev/null; then
            echo "✅ JSON部分抽出後に解析成功"
          else
            echo "❌ JSON解析失敗"
            echo ""
            echo "=== raw_output.txt の内容（先頭50行） ==="
            head -50 raw_output.txt
            echo ""
            echo "=== raw_output.txt の内容（末尾20行） ==="
            tail -20 raw_output.txt
            exit 1
          fi

          # 最終検証: 必須フィールドの存在確認
          if jq -e '.tasks' tasks.json > /dev/null 2>&1; then
            TASK_COUNT=$(jq '.tasks | length' tasks.json)
            echo "✅ tasksフィールド確認OK (${TASK_COUNT}件)"
          else
            echo "❌ tasksフィールドが見つかりません"
            echo ""
            echo "=== tasks.json の構造 ==="
            jq 'keys' tasks.json 2>/dev/null || cat tasks.json | head -50
            exit 1
          fi

      # -------------------------------------------------------
      # Step 8: タスク情報をMatrix形式に変換
      # -------------------------------------------------------
      # tasks.jsonからタスク情報を抽出し、後続のMatrix実行用に変換
      # agent_role（サブエージェント）を含む詳細情報を抽出
      # 【出力】
      # - tasks_count: タスク数
      # - tasks_matrix: Matrix実行用のJSON配列
      - name: Extract Tasks
        id: extract_tasks
        if: steps.check_conditions.outputs.should_run == 'true'
        run: |
          # tasks.jsonは Step 7 で生成済み

          # タスク数を取得
          TASK_COUNT=$(jq '.tasks | length' tasks.json)
          echo "📦 抽出タスク数: ${TASK_COUNT}件"

          # Matrix用のデータを jq で生成（subagent対応）
          jq -c '[.tasks | to_entries[] | {
            index: .key,
            task_id: (.value.payload.task_id // "task-\(.key)"),
            task_type: (.value.payload.task_type // "development"),
            subagent: (.value.payload.agent_role // .value.to_agent // "coder"),
            to_agent: (.value.to_agent // .value.payload.agent_role // "coder"),
            task_description: (.value.payload.task_description // ""),
            issue_title: (.value.payload.issue_title // ""),
            repo_url: (.value.payload.repo_url // ""),
            output_dir: (.value.payload.output_dir // "src/"),
            base_branch: (.value.payload.base_branch // "main"),
            pipeline_name: (.value.payload.pipeline_name // ""),
            branch: (.value.payload.branch // .value.payload.base_branch // "main")
          }]' tasks.json > tasks_matrix.json

          # 出力設定
          echo "tasks_count=$TASK_COUNT" >> $GITHUB_OUTPUT
          echo "tasks_matrix=$(cat tasks_matrix.json)" >> $GITHUB_OUTPUT

          # サマリー表示
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          jq -r '"📝 サマリー: \(.summary // "なし")"' tasks.json
          echo ""
          echo "📋 タスク一覧:"
          jq -r '.tasks[] | "  - [\(.payload.task_type)] \(.payload.agent_role // .to_agent) : \(.payload.task_id)"' tasks.json
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # -------------------------------------------------------
      # Step 8.1: task-composerによる静的解析
      # -------------------------------------------------------
      # tasks.jsonからDAG形式に変換し、task-composerで静的解析を実行
      # file_permissionsを基にWriteWrite/WriteRead競合を検出
      - name: Run Static Analysis for Conflict Detection
        id: static_analysis
        if: steps.check_conditions.outputs.should_run == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 静的解析: ファイル競合検出"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # tasks.jsonからDAG形式に変換
          # roleがnullの場合はデフォルト値を設定
          jq '{
            tasks: [.tasks[] | {
              task_id: .payload.task_id,
              name: .payload.task_description,
              executor: "mcp",
              dependencies: (.dependencies // []),
              role: (.role // {
                role_id: "default_role",
                name: "Default Role",
                file_permissions: {
                  allowed_paths: [],
                  denied_paths: [],
                  read_only_paths: []
                }
              })
            }],
            config: {
              max_concurrent_tasks: 4
            }
          }' tasks.json > dag_for_analysis.json

          echo "=== 生成されたDAG JSON ==="
          cat dag_for_analysis.json | jq '.'

          # task-composerで静的解析を実行
          # task-composerがインストールされていない場合はスキップ
          if command -v task-composer &> /dev/null; then
            echo ""
            echo "=== task-composer 静的解析実行 ==="
            task-composer analyze dag_for_analysis.json > analysis_result.txt 2>&1 || true
            cat analysis_result.txt

            # WriteWrite競合またはWriteRead競合を検出
            if grep -qE "(WriteWrite|WriteRead)" analysis_result.txt; then
              echo "has_conflict=true" >> $GITHUB_OUTPUT
              echo ""
              echo "⚠️ ファイル競合が検出されました"

              # 競合情報を抽出（WriteWriteとWriteRead両方）
              grep -E "(WriteWrite|WriteRead)" analysis_result.txt > conflicts.txt
              echo "conflicts<<EOF" >> $GITHUB_OUTPUT
              cat conflicts.txt >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT

              # 競合タイプ別のカウント
              WW_COUNT=$(grep -c "WriteWrite" analysis_result.txt || echo "0")
              WR_COUNT=$(grep -c "WriteRead" analysis_result.txt || echo "0")
              echo ""
              echo "📊 競合サマリー:"
              echo "  - WriteWrite競合: ${WW_COUNT}件"
              echo "  - WriteRead競合: ${WR_COUNT}件"
            else
              echo "has_conflict=false" >> $GITHUB_OUTPUT
              echo ""
              echo "✅ ファイル競合なし - 並列実行可能"
            fi
          else
            echo "⚠️ task-composerが未インストールのため静的解析をスキップ"
            echo "   インストール方法: cargo install --path task-composer-cli"
            echo "has_conflict=false" >> $GITHUB_OUTPUT
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # -------------------------------------------------------
      # Step 8.2: 競合がある場合、依存関係を追加
      # -------------------------------------------------------
      # 競合するタスクペアを検出し、辞書順で後のタスクに依存を追加
      # これにより競合するタスクが直列実行される
      - name: Resolve File Conflicts
        id: resolve_conflicts
        if: steps.static_analysis.outputs.has_conflict == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔧 ファイル競合の解決"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "検出された競合:"
          cat conflicts.txt
          echo ""

          # 外部スクリプトで競合解決
          python3 .github/script/conflict_resolver.py

          # Matrix用データを再生成
          jq -c '[.tasks | to_entries[] | {
            index: .key,
            task_id: (.value.payload.task_id // "task-\(.key)"),
            task_type: (.value.payload.task_type // "development"),
            subagent: (.value.payload.agent_role // .value.to_agent // "coder"),
            to_agent: (.value.to_agent // .value.payload.agent_role // "coder"),
            task_description: (.value.payload.task_description // ""),
            issue_title: (.value.payload.issue_title // ""),
            repo_url: (.value.payload.repo_url // ""),
            output_dir: (.value.payload.output_dir // "src/"),
            base_branch: (.value.payload.base_branch // "main"),
            pipeline_name: (.value.payload.pipeline_name // ""),
            branch: (.value.payload.branch // .value.payload.base_branch // "main"),
            dependencies: (.value.dependencies // [])
          }]' tasks.json > tasks_matrix.json

          echo "tasks_matrix=$(cat tasks_matrix.json)" >> $GITHUB_OUTPUT

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # -------------------------------------------------------
      # Step 8.3: task-composer用 DAG JSON生成（Phase 4）
      # -------------------------------------------------------
      # tasks.jsonからtask-composer実行用のDAG JSONを生成
      # 環境変数プレースホルダーを含む形式で出力
      - name: Generate DAG JSON for task-composer
        id: generate_dag
        if: steps.check_conditions.outputs.should_run == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Phase 4: DAG JSON生成"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # generate_dag.pyを実行
          if [ -f ".github/script/generate_dag.py" ]; then
            python3 .github/script/generate_dag.py
            echo "dag_generated=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ generate_dag.py が見つかりません（Phase 4未実装）"
            echo "dag_generated=false" >> $GITHUB_OUTPUT
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          # =====================================================
          # Ralph Loop設定（成果物検証・リトライ機構）
          # =====================================================
          # true: 検証失敗時に自動リトライ（最大RALPH_LOOP_MAX_ITERATIONS回）
          # false: 検証タスクは生成するがリトライは行わない
          ENABLE_RALPH_LOOP: "true"
          # リトライ最大回数（ENABLE_RALPH_LOOP=true時のみ有効）
          RALPH_LOOP_MAX_ITERATIONS: "3"

      # -------------------------------------------------------
      # Step 8.5: GitHub Projects v2のStatusを「作業中」に更新
      # -------------------------------------------------------
      # タスク分解が完了したら、IssueのStatusを自動更新
      # GraphQL APIを使用してProjects v2のフィールドを更新
      # 「作業中」または「In Progress」オプションを検索して設定
      - name: Update Project Status to In-Progress
        if: steps.check_conditions.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          GH_PAT_PROJECTS: ${{ secrets.GH_PAT_PROJECTS }}
          ISSUE_NUMBER: ${{ steps.get_issue.outputs.issue_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const pat = (process.env.GH_PAT_PROJECTS || '').trim();
            if (!pat) {
              console.log('⚠️ GH_PAT_PROJECTS未設定のためStatus更新をスキップします');
              return;
            }

            const gql = async (q, v) => {
              const resp = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: { 'Authorization': `bearer ${pat}`, 'Content-Type': 'application/json', 'User-Agent': 'devplanner-graphql-pat' },
                body: JSON.stringify({ query: q, variables: v })
              });
              const json = await resp.json();
              if (!resp.ok || json.errors) throw new Error(`GraphQL error: HTTP ${resp.status} ${JSON.stringify(json.errors || {})}`);
              return json.data;
            };

            // Query: ProjectアイテムのStatus fieldとoptionを取得
            const query = `
              query($owner:String!, $repo:String!, $issueNumber:Int!) {
                repository(owner:$owner, name:$repo) {
                  issue(number:$issueNumber) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id title number }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                __typename
                                ... on ProjectV2SingleSelectField { id name options { id name } }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await gql(query, { owner, repo, issueNumber });
            const items = data.repository?.issue?.projectItems?.nodes || [];
            let updates = 0;

            for (const item of items) {
              const singleValues = (item.fieldValues?.nodes || []).filter(v => v?.field?.__typename === 'ProjectV2SingleSelectField' && v?.field?.name === 'Status');
              if (singleValues.length === 0) continue;

              const statusField = singleValues[0].field;
              const inProgress = statusField.options?.find(o => o.name === '作業中')
                || statusField.options?.find(o => o.name?.toLowerCase() === 'in progress');

              if (!inProgress) {
                console.log(`⚠️ Project "${item.project?.title}" に"作業中"オプションが見つかりません`);
                continue;
              }

              const mutation = `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) { clientMutationId }
                }
              `;
              await gql(mutation, { projectId: item.project.id, itemId: item.id, fieldId: statusField.id, optionId: inProgress.id });
              updates++;
            }
            console.log(`✅ Status更新完了: 作業中へ ${updates}件`);

      # -------------------------------------------------------
      # Step 9: タスク情報をArtifactとして保存
      # -------------------------------------------------------
      # デバッグや後からの確認用にファイルをArtifactとして保存
      # 保存ファイル:
      # - tasks.json: 分解されたタスク定義
      # - tasks_matrix.json: Matrix実行用データ
      # - raw_output.txt: Claude APIの生出力
      # - dag_for_analysis.json: 静的解析用DAG JSON
      # - dag_for_execution.json: task-composer実行用DAG JSON（Phase 4）
      # - analysis_result.txt: task-composer静的解析結果
      # - conflicts.txt: 検出されたファイル競合情報
      - name: Upload Tasks Artifact
        if: steps.check_conditions.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: decomposed-tasks
          path: |
            tasks.json
            tasks_matrix.json
            raw_output.txt
            dag_for_analysis.json
            dag_for_execution.json
            analysis_result.txt
            conflicts.txt
          if-no-files-found: ignore
          retention-days: 7

      # -------------------------------------------------------
      # Step 10: Issueにタスク分解結果をコメント投稿
      # -------------------------------------------------------
      # 分解結果をMarkdown形式でIssueにコメント
      # - タスク概要（summary）
      # - タスクタイプ別集計
      # - 各タスクの詳細（<details>タグで折りたたみ表示）
      # - Actions実行ログへのリンク
      - name: Post Decomposition Result to Issue
        if: steps.check_conditions.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ steps.get_issue.outputs.issue_number }}');
            const taskCount = Number('${{ steps.extract_tasks.outputs.tasks_count }}') || 0;
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;

            const fs = require('fs');
            let tasksJson = [];
            let summaryText = '';

            if (fs.existsSync('tasks.json')) {
              const data = JSON.parse(fs.readFileSync('tasks.json', 'utf8'));
              tasksJson = data.tasks || [];
              summaryText = data.summary || '';
            }

            // タスクタイプ別の集計
            const taskTypeCounts = {};
            tasksJson.forEach(task => {
              const taskType = task.payload?.task_type || 'unknown';
              taskTypeCounts[taskType] = (taskTypeCounts[taskType] || 0) + 1;
            });

            const taskTypeTable = Object.entries(taskTypeCounts)
              .map(([type, count]) => `| \`${type}\` | ${count} |`)
              .join('\n');

            // エージェント名マッピング
            const agentNames = {
              'development': 'Soda (開発エージェント)',
              'cicd': 'CICDAgent (CI/CDエージェント)',
              'training': 'MLOps (学習エージェント)',
              'evaluation': 'IF (評価エージェント)'
            };

            // 各タスクの詳細セクション（折りたたみ）
            let taskDetailsSection = '';
            if (tasksJson.length > 0) {
              taskDetailsSection = '\n### 📦 分解されたタスク詳細\n\n';
              taskDetailsSection += '以下は各エージェントに割り当てられたタスクのJSON定義です。\n\n';

              tasksJson.forEach((task, index) => {
                const taskType = task.payload?.task_type || 'unknown';
                const taskId = task.payload?.task_id || `task-${index + 1}`;
                const taskDesc = task.payload?.task_description || '説明なし';
                const agentDisplayName = agentNames[taskType] || taskType;

                taskDetailsSection += `<details>\n`;
                taskDetailsSection += `<summary><strong>${index + 1}. ${agentDisplayName}</strong> - ${taskId}</summary>\n\n`;
                taskDetailsSection += `**タスク説明**: ${taskDesc}\n\n`;
                taskDetailsSection += '```json\n';
                taskDetailsSection += JSON.stringify(task, null, 2);
                taskDetailsSection += '\n```\n\n';
                taskDetailsSection += '</details>\n\n';
              });
            }

            const comment = [
              '## 🤖 DevPlanner - タスク分解完了 (Remote MCP対応)',
              '',
              `**対象Issue**: #${issueNumber}`,
              `**分解日時**: ${new Date().toISOString()}`,
              `**抽出タスク数**: ${taskCount}件`,
              '',
              '---',
              '',
              '### 📝 タスク概要',
              '',
              summaryText || 'タスクサマリーが取得できませんでした。',
              '',
              '### 📊 タスクタイプ別集計',
              '',
              '| タスクタイプ | 件数 |',
              '|-------------|------|',
              taskTypeTable || '| (なし) | 0 |',
              '',
              '### 🎯 振り分け先エージェント',
              '',
              '| タスクタイプ | AIエージェント | 用途 |',
              '|-------------|---------------|------|',
              '| `development` | Soda | ソフトウェア開発（設計・実装・レビュー） |',
              '| `cicd` | CICDAgent | CI/CDパイプライン実行 |',
              '| `training` | MLOps | AIモデル学習・チューニング |',
              '| `evaluation` | IF | GPU再現・評価 |',
              '',
              taskDetailsSection,
              '### 🔍 参考リンク',
              '',
              `- [Actions実行ログ](${runUrl})`,
              '- Artifact: `decomposed-tasks` (7日間保持)',
              '',
              '---',
              '',
              '> 💡 **次のステップ**: `dispatch-tasks` ジョブでRemote-MCP経由で各エージェントにタスクを振り分けます。',
              taskCount === 0 ? '\n> ⚠️ **注意**: タスクが抽出されませんでした。Claude出力を確認してください。' : ''
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

  # =============================================================
  # Job 2: dispatch-tasks（タスク振り分けジョブ）
  # =============================================================
  # 【役割】
  # - 分解されたタスクをtask_typeに応じて適切なAIエージェントに振り分け
  # - Matrix戦略により複数タスクを並列実行（最大2並列）
  #
  # 【対応エージェント】
  # - development → Soda（コーディングエージェント）
  # - cicd → CICDAgent（CI/CDパイプライン）
  # - training → MLOps（モデル学習）
  # - evaluation → IF（GPU評価）※未実装
  #
  # 【処理の流れ】
  # Step 1  : リポジトリをチェックアウト
  # Step 2  : Python環境セットアップ（uvパッケージマネージャー）
  # Step 3  : AWS認証（OIDC方式）
  # Step 4  : Cognitoトークン取得（Remote MCP認証用）
  # Step 5  : MCP設定ファイル（.mcp.json）生成
  # Step 6  : Claude経由でMCPツールを呼び出し
  # Step 7  : 実行結果をArtifactとして保存
  # =============================================================
  dispatch-tasks:
    runs-on: ubuntu-latest
    needs: decompose-task  # Job 1完了後に実行

    # タスクが1件以上ある場合のみ実行
    # Phase 4有効化のため無効化（execute-tasks-composerを使用）
    if: false && needs.decompose-task.outputs.tasks_count != '' && needs.decompose-task.outputs.tasks_count != '0'

    permissions:
      contents: read      # リポジトリの読み取り
      id-token: write     # AWS OIDC認証用
      issues: write       # Issue操作用

    # Matrix戦略: 各タスクを直列実行（競合防止のため）
    strategy:
      fail-fast: false    # 1つ失敗しても他は継続
      max-parallel: 1     # 直列実行（サブエージェント間のGit競合を防止）
      matrix:
        # decompose-taskの出力をMatrix展開
        # 各タスクが個別のジョブインスタンスとして実行される
        include: ${{ fromJSON(needs.decompose-task.outputs.tasks_matrix) }}

    steps:
      # -------------------------------------------------------
      # Step 1: リポジトリのチェックアウト
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Python環境セットアップ
      # -------------------------------------------------------
      # Cognitoトークン取得スクリプト実行に必要
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "✅ pyproject.toml found, running uv sync..."
            uv sync --no-install-project
          else
            echo "⚠️ pyproject.toml not found, installing minimal dependencies..."
            # get_token.pyは標準ライブラリのみで動作するため追加インストール不要
            echo "✅ get_token.py uses only standard library, no additional packages required"
          fi

      # -------------------------------------------------------
      # Step 3: AWS認証（OIDC方式）
      # -------------------------------------------------------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 認証確認（デバッグ用）
      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      # -------------------------------------------------------
      # Step 4: Cognitoトークン取得
      # -------------------------------------------------------
      # Remote MCPサーバーへの認証に使用するJWTトークンを取得
      # .github/script/get_token.py を実行してCognito認証を行う
      - name: Generate Cognito token for Remote MCP
        id: cognito-token
        run: |
          echo "Cognitoトークンを生成中..."
          # トークンを一時ファイルに出力（ログへの露出を防ぐ）
          if ! python .github/script/get_token.py > /tmp/token.txt 2>&1; then
            echo "❌ トークン取得に失敗しました"
            cat /tmp/token.txt >&2
            rm -f /tmp/token.txt
            exit 1
          fi
          TOKEN=$(cat /tmp/token.txt)
          rm -f /tmp/token.txt
          # 即座にマスクを適用
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ トークン取得成功"
        env:
          COGNITO_USERNAME: ${{ secrets.COGNITO_USERNAME }}
          COGNITO_PASSWORD: ${{ secrets.COGNITO_PASSWORD }}
          SODA_MCP_SECRET: ${{ secrets.SODA_MCP_SECRET }}

      # -------------------------------------------------------
      # Step 5: MCP設定ファイル（.mcp.json）生成
      # -------------------------------------------------------
      # Claude Code ActionがMCPツールを使用するための設定ファイル
      # 各エージェントのエンドポイントと認証情報を定義
      - name: Generate Multi-Agent MCP Config
        run: |
          cat > .mcp.json << EOF
          {
            "mcpServers": {
              "soda": {
                "type": "http",
                "url": "https://bedrock-agentcore.${{ env.SODA_MCP_REGION }}.amazonaws.com/runtimes/${{ secrets.SODA_REMOTE_MCP_ARN_ENCODED }}/invocations?qualifier=DEFAULT",
                "headers": {
                  "Authorization": "Bearer ${{ steps.cognito-token.outputs.token }}"
                }
              },
              "cicd": {
                "type": "http",
                "url": "http://${{ secrets.CICD_AGENT_HOST }}:${{ secrets.CICD_AGENT_PORT }}/mcp",
                "headers": {
                  "Authorization": "Bearer ${{ secrets.CICD_AGENT_TOKEN }}"
                }
              },
              "mlops": {
                "type": "http",
                "url": "http://${{ secrets.MLOPS_AGENT_HOST }}:${{ secrets.MLOPS_AGENT_PORT }}/mcp",
                "headers": {
                  "Authorization": "Bearer ${{ secrets.MLOPS_AGENT_TOKEN }}"
                }
              }
            }
          }
          EOF

          echo ".mcp.json生成完了"
          cat .mcp.json | jq 'del(.mcpServers[].headers.Authorization)'

      # -------------------------------------------------------
      # Step 6: Claude経由でMCPツールを呼び出し
      # -------------------------------------------------------
      # task_typeに応じて適切なMCPツールを選択・実行
      # - development → mcp__soda__invoke_soda
      # - cicd → mcp__cicd__invoke_pipeline
      # - training → mcp__mlops__invoke_training
      - name: Dispatch Task to Agent via Remote MCP
        id: dispatch
        timeout-minutes: 30  # MCP呼び出しの最大時間（長時間ハングを防止）
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            # タスク実行指示 (Remote MCP)

            以下のタスクを適切なAIエージェントで実行してください。

            ## 重要：作業ディレクトリとブランチ（厳守）

            **以下の設定を必ず守ってください：**

            | 項目 | 値 |
            |------|-----|
            | 作業ブランチ | `${{ matrix.branch }}` |
            | 出力ディレクトリ | `${{ matrix.output_dir }}` |
            | リポジトリ | ${{ matrix.repo_url }} |

            **ファイル作成時は必ず `${{ matrix.output_dir }}` 配下に作成してください。**

            例：
            - ソースコード: `${{ matrix.output_dir }}src/main.cpp`
            - テスト: `${{ matrix.output_dir }}tests/test_hello.cpp`
            - ドキュメント: `${{ matrix.output_dir }}docs/requirements.md`
            - README: `${{ matrix.output_dir }}README.md`

            ## タスク情報
            - **Task ID**: ${{ matrix.task_id }}
            - **Task Type**: ${{ matrix.task_type }}
            - **Subagent**: ${{ matrix.subagent }}
            - **Issue Number**: ${{ needs.decompose-task.outputs.issue_number }}
            - **Repository**: ${{ matrix.repo_url }}
            - **Branch**: ${{ matrix.branch }}
            - **Output Directory**: ${{ matrix.output_dir }}

            ## タスク詳細
            ${{ matrix.task_description }}

            ## 振り分けルール

            **task_type = "${{ matrix.task_type }}"** に基づいて、以下のツールを使用してください:

            ### development (Soda)
            `mcp__soda__invoke_soda` を使用

            **パラメータ:**
            - repo_url: ${{ matrix.repo_url }}
            - branch: ${{ matrix.branch }}
            - subagent: ${{ matrix.subagent }}
            - auto_commit: true
            - auto_push: true

            **promptに必ず以下を含めてください:**
            ```
            【作業ディレクトリ指定】
            すべてのファイルは以下のディレクトリ配下に作成すること:
            ${{ matrix.output_dir }}

            【ブランチ指定】
            作業ブランチ: ${{ matrix.branch }}

            【タスク内容】
            ${{ matrix.task_description }}
            ```

            ### cicd (CICDAgent)
            `mcp__cicd__invoke_pipeline` を使用
            - pipeline_name: ${{ matrix.pipeline_name }}
            - branch: ${{ matrix.branch }}

            ### training (MLOps)
            `mcp__mlops__invoke_training` を使用
            - 学習設定に基づいて実行

            ### evaluation (IF)
            現在未実装のため、以下のメッセージを出力:
            "IF Agent (evaluation) は現在未実装です。今後の実装をお待ちください。"

            ## 実行手順

            1. task_type "${{ matrix.task_type }}" を確認
            2. 対応するMCPツールを呼び出し（上記パラメータを必ず設定）
            3. 実行結果を取得
            4. 以下の形式で結果を報告:

            ```
            ========================================
            タスク実行完了
            ========================================
            Task ID: ${{ matrix.task_id }}
            Task Type: ${{ matrix.task_type }}
            Subagent: ${{ matrix.subagent }}
            Branch: ${{ matrix.branch }}
            Output Dir: ${{ matrix.output_dir }}
            Agent: [使用したエージェント名]
            Status: [成功/失敗]

            実行結果:
            [結果の詳細]
            ========================================
            ```

          claude_args: |
            --model us.anthropic.claude-opus-4-5-20251101-v1:0
            --mcp-config "${{ github.workspace }}/.mcp.json"
            --max-turns 20
            --allowedTools mcp__soda__invoke_soda_async,mcp__soda__get_task_status,mcp__soda__get_task_progress,mcp__soda__get_task_result,mcp__soda__cancel_task,mcp__cicd__invoke_pipeline,mcp__mlops__invoke_training
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          GITHUB_TOKEN: ${{ github.token }}
          SODA_TOKEN: ${{ steps.cognito-token.outputs.token }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ANTHROPIC_MODEL: us.anthropic.claude-opus-4-5-20251101-v1:0

      # -------------------------------------------------------
      # Step 7: 実行結果をArtifactとして保存
      # -------------------------------------------------------
      # 各タスクの実行結果をJSONファイルとして保存
      # Job 3（aggregate-results）で集約してレポートに使用
      - name: Save Execution Result
        if: always()
        run: |
          mkdir -p results
          cat > results/${{ matrix.task_id }}.json << EOF
          {
            "task_id": "${{ matrix.task_id }}",
            "task_type": "${{ matrix.task_type }}",
            "issue_number": ${{ needs.decompose-task.outputs.issue_number }},
            "status": "${{ job.status }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload Execution Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-result-${{ matrix.task_id }}
          path: results/
          retention-days: 7

  # =============================================================
  # Job 3: aggregate-results（結果集約ジョブ）
  # =============================================================
  # 【役割】
  # - 全タスクの実行結果を集約
  # - 成功/失敗の集計をIssueにレポート
  #
  # 【処理の流れ】
  # Step 1: 全タスクの実行結果Artifactをダウンロード
  # Step 2: 結果を集計してIssueにコメント投稿
  # Step 3: GitHub Actions Job Summaryに結果を出力
  # =============================================================
  aggregate-results:
    runs-on: ubuntu-latest
    needs: [decompose-task, execute-tasks-composer]  # Job 1, Job 4 完了後に実行

    # タスクが存在し、execute-tasks-composerが実行された場合のみ実行
    # always()を使用することで、dispatch-tasksが失敗しても実行される
    if: always() && needs.decompose-task.outputs.tasks_count != '' && needs.decompose-task.outputs.tasks_count != '0'

    permissions:
      issues: write  # Issueへのコメント投稿用

    steps:
      # -------------------------------------------------------
      # Step 1: 全タスクの実行結果Artifactをダウンロード
      # -------------------------------------------------------
      # execute-tasks-composerが保存したArtifactを収集
      - name: Download all execution results
        uses: actions/download-artifact@v4
        with:
          name: task-composer-results
          path: all-results/

      # -------------------------------------------------------
      # Step 2: 結果を集計してIssueにコメント投稿
      # -------------------------------------------------------
      # 全タスクの成功/失敗を集計し、レポートをIssueにコメント
      - name: Aggregate and Report Results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = ${{ needs.decompose-task.outputs.issue_number }};
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;

            // 結果ファイルを読み込み
            const resultsDir = 'all-results/results';
            let results = [];

            if (fs.existsSync(resultsDir)) {
              const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json'));
              for (const file of files) {
                try {
                  const content = fs.readFileSync(path.join(resultsDir, file), 'utf8');
                  results.push(JSON.parse(content));
                } catch (e) {
                  console.error(`Error reading ${file}: ${e}`);
                }
              }
            }

            // 集計
            const total = results.length;
            const succeeded = results.filter(r => r.status === 'success').length;
            const failed = results.filter(r => r.status === 'failure').length;

            // 結果テーブル
            const resultRows = results.map(r =>
              `| ${r.task_id} | \`${r.task_type}\` | ${r.status === 'success' ? '✅' : '❌'} ${r.status} |`
            ).join('\n');

            const comment = [
              '## DevPlanner - 全タスク実行完了レポート',
              '',
              `**対象Issue**: #${issueNumber}`,
              `**完了日時**: ${new Date().toISOString()}`,
              '',
              '### 実行サマリー',
              '',
              `| 項目 | 件数 |`,
              `|------|------|`,
              `| 総タスク数 | ${total} |`,
              `| 成功 | ${succeeded} |`,
              `| 失敗 | ${failed} |`,
              '',
              '### タスク別結果',
              '',
              '| Task ID | Task Type | Status |',
              '|---------|-----------|--------|',
              resultRows || '| (結果なし) | - | - |',
              '',
              '### 参考リンク',
              '',
              `- [Actions実行ログ](${runUrl})`,
              '',
              '---',
              '',
              failed > 0 ? '> ⚠️ 一部のタスクが失敗しました。詳細はActionsログを確認してください。' : '> ✅ すべてのタスクが正常に完了しました。'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            console.log(`Posted aggregation report to Issue #${issueNumber}`);

      # -------------------------------------------------------
      # Step 3: GitHub Actions Job Summaryに結果を出力
      # -------------------------------------------------------
      # Actionsの実行結果ページに表示されるサマリーを生成
      - name: Write Job Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## DevPlanner - Remote MCP 実行完了

          **対象Issue**: #${{ needs.decompose-task.outputs.issue_number }}
          **タスク数**: ${{ needs.decompose-task.outputs.tasks_count }}

          ### 振り分け先エージェント

          | タスクタイプ | AIエージェント | MCPツール |
          |-------------|---------------|----------|
          | `development` | Soda | `mcp__soda__invoke_soda_async` + ポーリング |
          | `cicd` | CICDAgent | `mcp__cicd__invoke_pipeline` |
          | `training` | MLOps | `mcp__mlops__invoke_training` |
          | `evaluation` | IF | (未実装) |

          詳細はIssueコメントを確認してください。
          EOF

  # =============================================================
  # Job 2: execute-tasks-composer（Phase 4: task-composer実行）
  # =============================================================
  # 【概要】
  # Phase 4で導入したtask-composerによるDAG実行ジョブ
  # 依存関係に基づく正確な並列実行を実現
  #
  # 【状態】
  # 現在有効化されており、dispatch-tasks（Matrix実行）に代わって
  # メインの実行パスとして使用されています
  #
  # 【処理の流れ】
  # Step 1: リポジトリをチェックアウト
  # Step 2: 必要なツールのセットアップ（Python, uv, Rust）
  # Step 3: task-composerをインストール
  # Step 4: DAG Artifactをダウンロード
  # Step 5: AWS認証（OIDC方式）
  # Step 6: Cognitoトークンを取得
  # Step 7: 環境変数を展開してDAG JSONを更新
  # Step 8: task-composerでDAGを実行
  # Step 8.5: タスク実行結果をJSON形式で保存
  # Step 9: 実行結果をArtifactとして保存
  # =============================================================
  execute-tasks-composer:
    runs-on: ubuntu-latest
    needs: decompose-task

    # Phase 4有効化: task-composerによる並列実行
    if: needs.decompose-task.outputs.tasks_count != '' && needs.decompose-task.outputs.tasks_count != '0'

    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      # -------------------------------------------------------
      # Step 1: リポジトリのチェックアウト
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: 必要なツールのセットアップ
      # -------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Rust (for task-composer)
        uses: dtolnay/rust-toolchain@stable

      # -------------------------------------------------------
      # Step 3: task-composerのインストール
      # -------------------------------------------------------
      - name: Install task-composer
        run: |
          echo "📦 task-composerをインストール中..."
          TASK_COMPOSER_DIR="${{ runner.temp }}/task-composer"
          git clone --depth 1 https://github.com/HNakamura33/task-composer.git "$TASK_COMPOSER_DIR"
          cd "$TASK_COMPOSER_DIR"
          cargo build --release -p task-composer-cli
          echo "$TASK_COMPOSER_DIR/target/release" >> $GITHUB_PATH
          echo "✅ task-composerインストール完了"

      # -------------------------------------------------------
      # Step 4: DAG Artifactをダウンロード
      # -------------------------------------------------------
      - name: Download DAG Artifact
        uses: actions/download-artifact@v4
        with:
          name: decomposed-tasks

      # -------------------------------------------------------
      # Step 5: AWS認証（OIDC方式）
      # -------------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------
      # Step 6: Cognitoトークン取得
      # -------------------------------------------------------
      - name: Generate Cognito token for Remote MCP
        id: cognito-token
        run: |
          echo "Cognitoトークンを生成中..."
          if ! python .github/script/get_token.py > /tmp/token.txt 2>&1; then
            echo "❌ トークン取得に失敗しました"
            cat /tmp/token.txt >&2
            rm -f /tmp/token.txt
            exit 1
          fi
          TOKEN=$(cat /tmp/token.txt)
          rm -f /tmp/token.txt
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ トークン取得成功"
        env:
          COGNITO_USERNAME: ${{ secrets.COGNITO_USERNAME }}
          COGNITO_PASSWORD: ${{ secrets.COGNITO_PASSWORD }}
          SODA_MCP_SECRET: ${{ secrets.SODA_MCP_SECRET }}

      # -------------------------------------------------------
      # Step 7: 改修案2用の依存パッケージをインストール
      # -------------------------------------------------------
      # soda_invoker.py が使用する boto3, requests をインストール
      - name: Install soda_invoker dependencies
        run: |
          echo "📦 soda_invoker.py の依存パッケージをインストール..."
          if [ -f ".github/script/requirements.txt" ]; then
            pip install -r .github/script/requirements.txt
            echo "✅ 依存パッケージのインストール完了"
          else
            echo "⚠️ requirements.txt が見つかりません"
            pip install boto3 requests
            echo "✅ boto3, requests を直接インストール"
          fi

      # -------------------------------------------------------
      # Step 7.1: 環境変数を展開してDAG JSONを更新
      # -------------------------------------------------------
      # 改修案2: bash executor + soda_invoker.py による直接呼び出し用
      #
      # NOTE: 対応案Aにより、BashExecutorはStep 8で設定したプロセス環境変数を継承する。
      # そのため、DAG JSON内のargs.env展開は実質的に不要だが、以下の理由で残している：
      # 1. cwdの絶対パス変換は引き続き必要
      # 2. デバッグ時のDAG確認に有用
      # 3. 将来のtask-composer修正（対応案B/C）に備える
      - name: Resolve Environment Variables in DAG JSON
        run: |
          echo "📝 環境変数を展開中..."
          echo "   ※ 対応案A適用済み: 環境変数はStep 8でプロセス継承される"

          # 改修案2用の環境変数（soda_invoker.py用）
          # NOTE: これらはenvsubstでDAG JSON内のプレースホルダーを展開するために設定
          # 実際の実行時はStep 8のenv設定から継承される
          export SCRIPT_DIR="${{ github.workspace }}/.github/script"
          export SODA_MCP_REGION="${{ env.SODA_MCP_REGION }}"
          export SODA_MCP_RUNTIME_ID="${{ secrets.SODA_REMOTE_MCP_ARN_ENCODED }}"
          # qualifier問題対応: 空に設定してqualifierパラメータを付与しない
          export SODA_MCP_QUALIFIER=""

          # Cognito認証設定（soda_invoker.pyで使用）
          export COGNITO_USER_POOL_ID="${{ secrets.COGNITO_USER_POOL_ID }}"
          export COGNITO_CLIENT_ID="${{ secrets.COGNITO_CLIENT_ID }}"
          export COGNITO_USERNAME="${{ secrets.COGNITO_USERNAME }}"
          export COGNITO_PASSWORD="${{ secrets.COGNITO_PASSWORD }}"

          # AWS認証情報（OIDC認証で取得した一時認証情報）
          export AWS_REGION="${AWS_REGION:-us-east-1}"
          export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}"
          export AWS_SESSION_TOKEN="${AWS_SESSION_TOKEN}"

          # タイムアウト設定
          export SODA_CONNECT_TIMEOUT="120"
          export SODA_READ_TIMEOUT="1800"

          # 旧環境変数（互換性のため残す）
          export SODA_TOKEN="${{ steps.cognito-token.outputs.token }}"
          export SODA_MCP_URL="https://bedrock-agentcore.${{ env.SODA_MCP_REGION }}.amazonaws.com/runtimes/${{ secrets.SODA_REMOTE_MCP_ARN_ENCODED }}/invocations"
          export MCP_SERVER_DIR="${{ runner.temp }}/task-composer/mcp_servers/claude_code_mcp"
          export ANTHROPIC_MODEL="us.anthropic.claude-sonnet-4-5-20250929-v1:0"

          # envsubstで環境変数を展開
          # NOTE: args.envの展開は対応案Aにより実質不要だが、cwdの絶対パス変換のために処理を継続
          if [ -f "dag_for_execution.json" ]; then
            envsubst < dag_for_execution.json > dag_resolved.json
            echo "✅ DAG JSON環境変数展開完了"
            echo "=== 展開後のDAG（認証情報マスク済み） ==="
            # 改修案2: bash executorの環境変数をマスクして表示
            cat dag_resolved.json | jq 'del(.tasks[].args.env.COGNITO_PASSWORD) | del(.tasks[].args.env.AWS_SECRET_ACCESS_KEY) | del(.tasks[].args.env.AWS_SESSION_TOKEN)'

            # cwdを絶対パスに変換（bash executorでも必要）
            echo ""
            echo "=== cwdを絶対パスに変換 ==="
            jq --arg base "$PWD" '
              .tasks[].args.cwd |=
                if . and . != "" and (startswith("/") | not) then "\($base)/\(.)" else . end
            ' dag_resolved.json > dag_resolved_abs.json && mv dag_resolved_abs.json dag_resolved.json
            echo "✅ cwd絶対パス変換完了"

            # 変換結果を確認
            echo "=== 変換後のcwd一覧 ==="
            jq -r '.tasks[].args.cwd // "N/A"' dag_resolved.json
          else
            echo "❌ dag_for_execution.json が見つかりません"
            exit 1
          fi

      # -------------------------------------------------------
      # Step 7.5: 作業ディレクトリを作成
      # -------------------------------------------------------
      # DAG JSON内のcwdで指定されたディレクトリを作成
      # task-composerがWorking directoryエラーを起こさないようにする
      # 改修案2: bash executor用のパス（.tasks[].args.cwd）
      - name: Create Working Directories
        run: |
          echo "📁 作業ディレクトリを作成中..."

          # DAG JSONからcwdを抽出してユニークなディレクトリ一覧を取得
          # 改修案2: bash executorのcwdパス
          if [ -f "dag_resolved.json" ]; then
            jq -r '.tasks[].args.cwd // empty' dag_resolved.json | sort -u | while read cwd; do
              if [ -n "$cwd" ]; then
                echo "  作成: $cwd"
                mkdir -p "$cwd"
              fi
            done
            echo "✅ 作業ディレクトリ作成完了"

            # 作成されたディレクトリを確認
            echo ""
            echo "=== 作成されたディレクトリ一覧 ==="
            jq -r '.tasks[].args.cwd // empty' dag_resolved.json | sort -u | while read cwd; do
              if [ -n "$cwd" ] && [ -d "$cwd" ]; then
                echo "  ✅ $cwd"
              fi
            done
          else
            echo "⚠️ dag_resolved.json が見つかりません"
          fi

      # -------------------------------------------------------
      # Step 7.6: soda_invoker.pyのデバッグテスト
      # -------------------------------------------------------
      # 目的: task-composer実行前にsoda_invoker.pyの動作を確認
      # エラー内容を特定するためのデバッグステップ
      - name: Debug - Test soda_invoker.py
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 soda_invoker.py デバッグテスト"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo ""
          echo "=== 環境変数確認（マスク済み） ==="
          echo "SCRIPT_DIR: ${SCRIPT_DIR}"
          echo "SODA_MCP_REGION: ${SODA_MCP_REGION}"
          echo "SODA_MCP_RUNTIME_ID: ${SODA_MCP_RUNTIME_ID:0:10}..."
          echo "SODA_MCP_QUALIFIER: '${SODA_MCP_QUALIFIER}'"
          echo "COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:0:10}..."
          echo "COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:0:10}..."
          echo "COGNITO_USERNAME: ${COGNITO_USERNAME:0:3}..."

          echo ""
          echo "=== soda_invoker.py存在確認 ==="
          ls -la "${SCRIPT_DIR}/soda_invoker.py" || echo "❌ soda_invoker.py が見つかりません"

          echo ""
          echo "=== Pythonパッケージ確認 ==="
          python3 -c "import boto3; print(f'boto3: {boto3.__version__}')" || echo "❌ boto3 インポートエラー"
          python3 -c "import requests; print(f'requests: {requests.__version__}')" || echo "❌ requests インポートエラー"

          echo ""
          echo "=== soda_invoker.py テスト実行 ==="
          # テスト用の簡単なパラメータ（実際には呼び出しを行わない構文チェック用）
          TEST_PARAMS='{"prompt":"test","repo_url":"https://github.com/test/test.git","branch":"main","subagent":"coder"}'
          TEST_PARAMS_B64=$(echo -n "$TEST_PARAMS" | base64 -w0)
          echo "Base64エンコード済みパラメータ: ${TEST_PARAMS_B64:0:50}..."

          # soda_invoker.pyを実行（タイムアウト30秒）
          # エラーが発生しても処理を続行するため || true を付与
          echo ""
          echo "=== 実行開始 ==="
          timeout 30 python3 "${SCRIPT_DIR}/soda_invoker.py" --base64 "$TEST_PARAMS_B64" 2>&1 || {
            EXIT_CODE=$?
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️ soda_invoker.py テスト結果"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Exit code: $EXIT_CODE"
            if [ $EXIT_CODE -eq 124 ]; then
              echo "原因: タイムアウト（30秒）"
            fi
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          }

          echo ""
          echo "=== デバッグテスト完了 ==="
          # テストの結果に関わらず後続のtask-composer実行を継続
        env:
          SCRIPT_DIR: ${{ github.workspace }}/.github/script
          SODA_MCP_REGION: ${{ env.SODA_MCP_REGION }}
          SODA_MCP_RUNTIME_ID: ${{ secrets.SODA_REMOTE_MCP_ARN_ENCODED }}
          SODA_MCP_QUALIFIER: ""
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_USERNAME: ${{ secrets.COGNITO_USERNAME }}
          COGNITO_PASSWORD: ${{ secrets.COGNITO_PASSWORD }}
          SODA_CONNECT_TIMEOUT: "30"
          SODA_READ_TIMEOUT: "30"

      # -------------------------------------------------------
      # Step 8: task-composerでDAGを実行
      # -------------------------------------------------------
      # 改修案2: bash executor経由でsoda_invoker.pyを実行
      # BashExecutorはctx.env_varsが空のため、プロセス環境変数から継承させる
      - name: Execute DAG with task-composer
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 task-composerでDAGを実行"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 静的解析
          echo ""
          echo "=== 静的解析 ==="
          task-composer analyze dag_resolved.json || true

          # DAG実行
          echo ""
          echo "=== DAG実行 ==="
          task-composer run dag_resolved.json

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DAG実行完了"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          # AWS Bedrock経由でClaude APIを使用（ANTHROPIC_API_KEY不要）
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: us.anthropic.claude-sonnet-4-5-20250929-v1:0
          # =====================================================
          # 改修案2（対応案A）: soda_invoker.py用の環境変数
          # task-composerのBashExecutorはctx.env_varsが常に空のため、
          # プロセス環境変数として設定し、子プロセスに継承させる
          # =====================================================
          # Soda Remote MCP設定
          SODA_MCP_REGION: ${{ env.SODA_MCP_REGION }}
          SODA_MCP_RUNTIME_ID: ${{ secrets.SODA_REMOTE_MCP_ARN_ENCODED }}
          SODA_MCP_QUALIFIER: ""  # qualifier問題対応: 空に設定
          # Cognito認証設定
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_USERNAME: ${{ secrets.COGNITO_USERNAME }}
          COGNITO_PASSWORD: ${{ secrets.COGNITO_PASSWORD }}
          # タイムアウト設定
          SODA_CONNECT_TIMEOUT: "120"
          SODA_READ_TIMEOUT: "1800"
          # スクリプトディレクトリ
          SCRIPT_DIR: ${{ github.workspace }}/.github/script

      # -------------------------------------------------------
      # Step 8.5: タスク実行結果をJSON形式で保存
      # -------------------------------------------------------
      # aggregate-resultsが期待する形式の結果JSONを生成
      # dispatch-tasksと同様の形式で出力することで互換性を確保
      - name: Generate Execution Results JSON
        if: always()
        run: |
          echo "📊 タスク実行結果をJSON形式で保存..."
          mkdir -p results

          # DAGの各タスクについて結果ファイルを作成
          if [ -f "dag_resolved.json" ]; then
            ISSUE_NUMBER="${{ needs.decompose-task.outputs.issue_number }}"
            JOB_STATUS="${{ job.status }}"
            TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # jqでタスクIDを抽出し、各タスクの結果JSONを生成
            jq -r '.tasks[].task_id' dag_resolved.json | while read task_id; do
              cat > "results/${task_id}.json" << EOF
          {
            "task_id": "${task_id}",
            "task_type": "development",
            "issue_number": ${ISSUE_NUMBER},
            "status": "${JOB_STATUS}",
            "timestamp": "${TIMESTAMP}",
            "executor": "task-composer"
          }
          EOF
              echo "  ✅ results/${task_id}.json を生成"
            done

            echo "📁 生成されたファイル一覧:"
            ls -la results/
          else
            echo "⚠️ dag_resolved.json が見つかりません"
            # フォールバック: 単一の結果ファイルを生成
            cat > "results/task-composer-job.json" << EOF
          {
            "task_id": "task-composer-job",
            "task_type": "development",
            "issue_number": ${{ needs.decompose-task.outputs.issue_number }},
            "status": "${{ job.status }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "executor": "task-composer"
          }
          EOF
          fi

      # -------------------------------------------------------
      # Step 9: 実行結果をArtifactとして保存
      # -------------------------------------------------------
      - name: Upload Execution Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-composer-results
          path: |
            results/
            dag_resolved.json
            task-composer-*.log
          if-no-files-found: ignore
          retention-days: 7
